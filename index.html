<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>观察日报</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Microsoft YaHei", "Noto Sans SC", sans-serif;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 72px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }
    p {
      margin: 0 0 16px;
      color: #444;
    }
    .cards {
      display: grid;
      gap: 20px;
      margin-top: 28px;
    }
    .card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px 24px;
      background: #fff;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }
    .card p {
      margin: 0 0 12px;
      color: #555;
    }
    a {
      color: #0f5e3a;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
    footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid #e0e0e0;
      color: #999;
      font-size: 0.85em;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>观察日报</h1>
    <p>AI 驱动的自动化内容发布平台。</p>
    <div class="cards">
      <div class="card">
        <h2><a href="./algorithms/">每日算法专题</a></h2>
        <p>每日算法与数据结构专题教程，从直觉到实现</p>
        <a href="./feeds/algorithms.xml">RSS Feed</a>
      </div>
      <div class="card">
        <h2><a href="./news/">观察日报</a></h2>
        <p>每日国际新闻精选：美国政局 · 国际局势 · 科技前沿 · 经济走势</p>
        <a href="./feeds/news.xml">RSS Feed</a>
      </div>
    </div>
  </main>
  <footer>
    <p>自动生成，Reader 订阅即读。</p>
  </footer>
</body>
</html>
