name: Monthly Publish
on:
  schedule:
    - cron: '40 23 28-31 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-news-monthly
  cancel-in-progress: true

jobs:
  delegate:
    uses: ./.github/workflows/publish-product.yml
    with:
      product_key: news
      report_type: monthly
    secrets: inherit
