name: Daily RSS Publish
on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      digest_only:
        description: '仅使用数据库中的现有文章重生成日报，不重新抓取'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-news-daily
  cancel-in-progress: true

jobs:
  scheduled:
    if: github.event_name == 'schedule'
    uses: ZhangEx18/us_politics_news/.github/workflows/publish-product.yml@main
    with:
      product_key: news
      report_type: daily
      digest_only: false
    secrets: inherit

  manual:
    if: github.event_name == 'workflow_dispatch'
    uses: ZhangEx18/us_politics_news/.github/workflows/publish-product.yml@main
    with:
      product_key: news
      report_type: daily
      digest_only: ${{ inputs.digest_only }}
    secrets: inherit
