name: Daily RSS Publish
on:
  workflow_dispatch:
    inputs:
      digest_only:
        description: '仅使用数据库中的现有文章重生成日报，不重新抓取'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-news-daily
  cancel-in-progress: true

jobs:
  delegate:
    uses: ./.github/workflows/publish-product.yml
    with:
      product_key: news
      report_type: daily
      digest_only: ${{ inputs.digest_only || false }}
    secrets: inherit
