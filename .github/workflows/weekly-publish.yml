name: Weekly Publish
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-news-weekly
  cancel-in-progress: true

jobs:
  delegate:
    uses: ZhangEx18/us_politics_news/.github/workflows/publish-product.yml@main
    with:
      product_key: news
      report_type: weekly
    secrets: inherit
