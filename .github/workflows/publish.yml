name: Daily Publish
on:
  workflow_dispatch:

# ⚠️ 此 workflow 已废弃，请使用 publish-product.yml 替代。
# 保留此文件仅为历史兼容，所有新逻辑请走 publish-product workflow。
# 本文件已统一到正式路径 data/products/news/news.db，不再写入旧路径。

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from news-data branch
        run: |
          DB_PATH="data/products/news/news.db"
          STATE_BRANCH="news-data"

          mkdir -p "$(dirname "$DB_PATH")"
          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$STATE_BRANCH"
            if git show "origin/${STATE_BRANCH}:${DB_PATH}" > "$DB_PATH" 2>/dev/null; then
              echo "已从 origin/${STATE_BRANCH}:${DB_PATH} 恢复数据库到 ${DB_PATH}"
            fi

            if [ -s "$DB_PATH" ]; then
              ls -lh "$DB_PATH"
            else
              echo "分支存在但数据库为空，将创建新数据库"
            fi
          else
            echo "${STATE_BRANCH} 分支不存在，将创建新数据库"
          fi

      - name: Restore published pages state
        run: python3 scripts/sync_pages_state.py restore

      - name: Generate daily digest
        run: python3 src/run_pipeline.py --digest-only --hours 24
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}

      - name: Build daily index
        run: python3 scripts/sync_pages_state.py build-index

      - name: Validate output
        run: |
          TODAY=$(python3 scripts/report_date.py)
          grep -q "content:encoded" docs/feed.xml || { echo "feed.xml 缺少 content:encoded"; exit 1; }
          [ -f "docs/daily/$TODAY.md" ] || { echo "日报不存在"; exit 1; }
          grep -q "一、美国政局" "docs/daily/$TODAY.md" || { echo "缺少美国政局栏目"; exit 1; }
          grep -q "二、国际局势" "docs/daily/$TODAY.md" || { echo "缺少国际局势栏目"; exit 1; }
          grep -q "三、科技前沿" "docs/daily/$TODAY.md" || { echo "缺少科技前沿栏目"; exit 1; }
          grep -q "四、经济走势" "docs/daily/$TODAY.md" || { echo "缺少经济走势栏目"; exit 1; }
          CHARS=$(wc -c < "docs/daily/$TODAY.md")
          echo "日报字节: $CHARS"
          [ "$CHARS" -gt 10000 ] || { echo "日报字数过少"; exit 1; }
          python3 - <<'PY'
          from pathlib import Path
          feed = Path("docs/feed.xml").read_text(encoding="utf-8")
          blocked = ["<!DOCTYPE html>", "<html", "<head>", "<style>", "相关阅读", "原文链接", "<strong>来源：</strong>", "来源："]
          bad = [token for token in blocked if token in feed]
          if bad:
              raise SystemExit(f"Reader feed 仍含不应出现的内容: {bad}")
          print("Reader feed 格式校验通过")
          PY
          echo "校验通过"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

      - name: Persist database to news-data branch
        run: |
          DB_PATH="data/products/news/news.db"
          STATE_BRANCH="news-data"
          test -f "$DB_PATH" || { echo "数据库文件不存在: $DB_PATH"; exit 1; }
          TMP_DIR=$(mktemp -d)
          mkdir -p "$TMP_DIR/$(dirname "$DB_PATH")"
          cp "$DB_PATH" "$TMP_DIR/$DB_PATH"
          printf "*.pyc\n__pycache__/\n.DS_Store\n" > "$TMP_DIR/.gitignore"
          cd "$TMP_DIR"
          git init
          git checkout -b "$STATE_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DB_PATH" .gitignore
          git commit -m "Update news database"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${STATE_BRANCH}" --force
