name: Fetch News
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from news-data branch
        run: |
          DB_PATH="data/products/news/news.db"
          STATE_BRANCH="news-data"

          mkdir -p "$(dirname "$DB_PATH")"
          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$STATE_BRANCH"
            if git show "origin/${STATE_BRANCH}:${DB_PATH}" > "$DB_PATH" 2>/dev/null; then
              echo "已从 origin/${STATE_BRANCH}:${DB_PATH} 恢复数据库到 ${DB_PATH}"
            fi

            if [ -s "$DB_PATH" ]; then
              ls -lh "$DB_PATH"
            else
              echo "分支存在但数据库为空，将创建新数据库"
            fi
          else
            echo "${STATE_BRANCH} 分支不存在，将创建新数据库"
          fi

      - name: Fetch news
        run: python3 src/run_pipeline.py --fetch-only --hours 24
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TIANAPI_KEY: ${{ secrets.TIANAPI_KEY }}

      - name: Persist database to news-data branch
        run: |
          DB_PATH="data/products/news/news.db"
          STATE_BRANCH="news-data"
          test -f "$DB_PATH" || { echo "数据库文件不存在: $DB_PATH"; exit 1; }
          TMP_DIR=$(mktemp -d)
          mkdir -p "$TMP_DIR/$(dirname "$DB_PATH")"
          cp "$DB_PATH" "$TMP_DIR/$DB_PATH"
          printf "*.pyc\n__pycache__/\n.DS_Store\n" > "$TMP_DIR/.gitignore"
          cd "$TMP_DIR"
          git init
          git checkout -b "$STATE_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DB_PATH" .gitignore
          git commit -m "Update news database"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin "HEAD:${STATE_BRANCH}" --force
