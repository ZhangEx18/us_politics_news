# 四维日报运行配置
# 源列表在 sources.yaml

output:
  daily_dir: "docs/daily"
  weekly_dir: "docs/weekly"
  monthly_dir: "docs/monthly"
  feed_path: "docs/feed.xml"
  base_url: ""

analysis:
  window_hours: 24
  history_context_days: 3
  min_llm_score: 65
  important_score: 85

llm:
  provider: openai
  model: mimo-v2.5-pro
  base_url: "https://token-plan-cn.xiaomimimo.com/v1"
  max_concurrent: 5
  max_prompt_chars: 120000
  timeout_seconds: 180
  score_max_concurrent: 2
  score_max_prompt_chars: 9000
  score_timeout_seconds: 120
  score_content_chars: 400
  score_retry_split_depth: 3
  digest_timeout_seconds: 240
  digest_content_chars: 1000
  meta_timeout_seconds: 120

digest:
  language: zh
  # 每栏字数目标
  column:
    target_word_count_min: 2500
    target_word_count: 3500
    target_word_count_max: 5000
  # 全文字数目标
  total:
    target_word_count_min: 10000
    target_word_count: 14000
    target_word_count_max: 20000
  # 每栏目配额
  columns:
    us_politics:
      label: "美国政情"
      min_items: 8
      target_items: 5
      max_items: 6
      headline_items: 5
      prefilter_items: 25
    global_affairs:
      label: "国际风云"
      min_items: 10
      target_items: 6
      max_items: 7
      headline_items: 6
      prefilter_items: 40
    technology:
      label: "科技前沿"
      min_items: 5
      target_items: 4
      max_items: 5
      headline_items: 4
      prefilter_items: 24
    economy:
      label: "财经脉动"
      min_items: 5
      target_items: 4
      max_items: 5
      headline_items: 4
      prefilter_items: 24
  total_min_items: 28
  total_target_items: 35
  total_max_items: 45
  weekly:
    target_word_count_min: 8000
    target_word_count: 12000
    target_word_count_max: 16000
  monthly:
    target_word_count_min: 15000
    target_word_count: 20000
    target_word_count_max: 30000

feed:
  include_full_content: true
  keep_days: 30
  stable_daily_guid: true
  description_max_chars: 300

storage:
  db_path: "data/news.db"
  retention_days: 30

runtime:
  require_ai: true
  min_score_coverage: 0.7
  proxy_from_env: true
